services:
  - type: web
    name: luxury-hotel-backend
    runtime: docker
    plan: free
    region: singapore
    rootDir: code/backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /actuator/health
    autoDeployTrigger: checksPass
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: JAVA_TOOL_OPTIONS
        value: -Xms64m -Xmx240m -Xss512k -XX:+UseSerialGC -XX:MaxMetaspaceSize=128m -XX:ReservedCodeCacheSize=48m -XX:+ExitOnOutOfMemoryError -Dfile.encoding=UTF-8 -Duser.timezone=Asia/Ho_Chi_Minh
      - key: MALLOC_ARENA_MAX
        value: "2"
      - key: SPRING_DATA_JPA_REPOSITORIES_BOOTSTRAP_MODE
        value: default
      - key: DB_POOL_MAX_SIZE
        value: "5"
      - key: DB_POOL_MIN_IDLE
        value: "0"
      - key: DB_CONNECTION_TIMEOUT_MS
        value: "30000"
      - key: AUTH_COOKIE_SECURE
        value: "true"
      - key: AUTH_COOKIE_SAME_SITE
        value: Lax
      - key: OAUTH_EXCHANGE_TICKET_TTL_SECONDS
        value: "120"
      - key: APP_UPLOAD_STORAGE
        value: cloudinary
      - key: APP_STATIC_MEDIA_MIGRATION_ENABLED
        value: "false"
      - key: APP_SEED_MASTER_DATA_ENABLED
        value: "false"
      - key: APP_SEED_DEMO_USERS_ENABLED
        value: "false"
      - key: APP_BOOTSTRAP_ADMIN_ENABLED
        value: "false"
      - key: VNPAY_REFUND_ENABLED
        value: "false"
      - key: SEPAY_RECONCILIATION_ENABLED
        value: "true"
      - key: TRUST_FORWARDED_HEADERS
        value: "false"
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_USERNAME
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: FRONTEND_BASE_URL
        sync: false
      - key: BACKEND_BASE_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: JWT_ACCESS_KEY
        sync: false
      - key: JWT_REFRESH_KEY
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_ID
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_SECRET
        sync: false
      - key: FACEBOOK_OAUTH_CLIENT_ID
        sync: false
      - key: FACEBOOK_OAUTH_CLIENT_SECRET
        sync: false
      - key: REFUND_DATA_ENCRYPTION_KEY
        sync: false
      - key: HOTEL_NAME
        value: Luxury Hotel
      - key: HOTEL_ADDRESS
        sync: false
      - key: HOTEL_PHONE
        sync: false
      - key: HOTEL_EMAIL
        sync: false
      - key: HOTEL_TAX_CODE
        sync: false
      - key: MERCHANT_BANK_CODE
        sync: false
      - key: MERCHANT_BANK_NAME
        sync: false
      - key: MERCHANT_BANK_ACCOUNT_NUMBER
        sync: false
      - key: MERCHANT_BANK_ACCOUNT_NAME
        sync: false
      - key: SEPAY_WEBHOOK_SECRET
        sync: false
      - key: SEPAY_API_ACCESS_TOKEN
        sync: false
      - key: SEPAY_API_BANK_ACCOUNT_ID
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_FOLDER
        value: hotel-media
      - key: SEED_MEDIA_BASE_URL
        sync: false
      - key: VERIFICATION_SENDGRID_API_KEY
        sync: false
      - key: VERIFICATION_SENDGRID_FROM_EMAIL
        sync: false
      - key: VERIFICATION_SENDGRID_TEMPLATE_ID
        sync: false
      - key: PASSWORD_RESET_SENDGRID_TEMPLATE_ID
        sync: false
      - key: BOOKING_CONFIRMATION_SENDGRID_TEMPLATE_ID
        sync: false
      - key: CONTACT_REPLY_SENDGRID_TEMPLATE_ID
        sync: false
      - key: AUDIT_ALERT_SENDGRID_TEMPLATE_ID
        sync: false
      - key: AUDIT_ALERT_RECIPIENTS
        sync: false
