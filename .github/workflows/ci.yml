name: Quality gates

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-gates-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  branch-policy:
    name: Branch policy
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Validate promotion path
        env:
          BASE_BRANCH: ${{ github.base_ref }}
          HEAD_BRANCH: ${{ github.head_ref }}
        shell: bash
        run: |
          set -euo pipefail

          short_lived='^(feature|fix|chore|docs|test|refactor)/[a-z0-9][a-z0-9._-]*$'
          hotfix='^hotfix/[a-z0-9][a-z0-9._-]*$'
          release='^release/[a-z0-9][a-z0-9._-]*$'

          case "$BASE_BRANCH" in
            develop)
              [[ "$HEAD_BRANCH" =~ $short_lived || "$HEAD_BRANCH" =~ $hotfix || "$HEAD_BRANCH" == "main" ]]
              ;;
            main)
              [[ "$HEAD_BRANCH" == "develop" || "$HEAD_BRANCH" =~ $release || "$HEAD_BRANCH" =~ $hotfix ]]
              ;;
            *)
              echo "Unsupported target branch: $BASE_BRANCH" >&2
              exit 1
              ;;
          esac || {
            echo "Invalid promotion path: $HEAD_BRANCH -> $BASE_BRANCH" >&2
            echo "Expected feature/fix/chore/docs/test/refactor -> develop -> main, or an approved hotfix path." >&2
            exit 1
          }

  backend:
    name: Backend and PostgreSQL 16
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: code/backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Test unit, migration and concurrency gates
        run: ./mvnw -B -ntp -Ppostgres-migration-test verify
      - name: Build production container
        run: docker build --tag luxury-hotel-backend:ci .

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: code/frontend
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: code/frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run build
