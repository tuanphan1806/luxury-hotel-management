name: Production gates

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-gates-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend and PostgreSQL 16
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: code/backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Test unit, migration and concurrency gates
        run: ./mvnw -B -ntp -Ppostgres-migration-test verify
      - name: Build production container
        run: docker build --tag luxury-hotel-backend:ci .

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: code/frontend
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: code/frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run build
