services:
  postgres:
    container_name: postgres
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: hotelmanagement
      POSTGRES_USER: ${DATABASE_USERNAME:-hotel}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-hotel}
    ports:
      # 5433 avoids colliding with a PostgreSQL service installed on Windows.
      # Containers still use postgres:5432 on the Compose network.
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - default
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20


  backend:
    container_name: backend
    build:
      context: ./
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    # .env is injected at runtime, never copied into the image.
    env_file:
      - .env
    environment:
      # Containers reach PostgreSQL by service name, not localhost.
      DATABASE_URL: jdbc:postgresql://postgres:5432/hotelmanagement
      DATABASE_USERNAME: ${DATABASE_USERNAME:-hotel}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-hotel}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - default

networks:
  default:
    name: backend

volumes:
  postgres-data:

